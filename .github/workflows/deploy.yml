name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Deploy is handled automatically by Vercel Git Integration on push to main.
# This workflow only runs quality checks (lint + tests).

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test
