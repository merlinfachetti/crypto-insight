# GitHub Actions disabled — CI/CD is handled by Vercel Git Integration.
# Vercel auto-deploys on every push to main.
# Re-enable this workflow when GitHub Actions billing is active.

name: CI (disabled)

on:
  workflow_dispatch: # manual only — not triggered on push/PR

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
